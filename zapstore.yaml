description: |
  Iris Chat is an end-to-end encrypted mobile chat app built on Nostr and the
  Double Ratchet protocol.

  Current app capabilities include:
  - encrypted one-to-one messaging
  - group conversations
  - multi-device identity and device linking
  - QR and link-based invites
  - offline message queueing and relay sync
