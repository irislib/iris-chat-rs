name: IrisChat
options:
  bundleIdPrefix: to.iris.chat
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: to.iris.chat
    DEVELOPMENT_TEAM: J8PPJKD7TA
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    VERSIONING_SYSTEM: apple-generic
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: 5.0

schemes:
  IrisChat:
    build:
      targets:
        IrisChat: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - IrisChatTests
        - IrisChatUITests
    archive:
      config: Release

targets:
  IrisChat:
    type: application
    platform: iOS
    sources:
      - path: Assets.xcassets
      - path: Sources
      - path: Bindings
        excludes:
          - "*.h"
          - "*.modulemap"
    settings:
      base:
        PRODUCT_NAME: IrisChat
        CODE_SIGN_ENTITLEMENTS: IrisChat.entitlements
        DEFINES_MODULE: YES
        INFOPLIST_FILE: Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Iris Chat
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
      configs:
        Debug:
          APS_ENVIRONMENT: development
        Release:
          APS_ENVIRONMENT: production
    dependencies:
      - framework: Frameworks/IrisChatCore.xcframework
        embed: false
      - target: NotificationService
      - target: ShareExtension

  NotificationService:
    type: app-extension
    platform: iOS
    sources:
      - path: NotificationService/NotificationService.swift
      - path: Bindings
        excludes:
          - "*.h"
          - "*.modulemap"
    settings:
      base:
        PRODUCT_NAME: NotificationService
        PRODUCT_BUNDLE_IDENTIFIER: to.iris.chat.NotificationService
        DEVELOPMENT_TEAM: J8PPJKD7TA
        CODE_SIGN_ENTITLEMENTS: NotificationService/NotificationService.entitlements
        INFOPLIST_FILE: NotificationService/Info.plist
        SKIP_INSTALL: YES
    dependencies:
      - framework: Frameworks/IrisChatCore.xcframework
        embed: false

  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension/ShareViewController.swift
    settings:
      base:
        PRODUCT_NAME: ShareExtension
        PRODUCT_BUNDLE_IDENTIFIER: to.iris.chat.ShareExtension
        DEVELOPMENT_TEAM: J8PPJKD7TA
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
        INFOPLIST_FILE: ShareExtension/Info.plist
        SKIP_INSTALL: YES

  IrisChatTests:
    type: bundle.unit-test
    platform: iOS
    settings:
      base:
        PRODUCT_NAME: "$(TARGET_NAME)"
        PRODUCT_MODULE_NAME: "$(TARGET_NAME)"
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: IrisChat
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/IrisChat.app/IrisChat"
        BUNDLE_LOADER: "$(TEST_HOST)"
    sources:
      - path: Tests
    dependencies:
      - target: IrisChat

  IrisChatUITests:
    type: bundle.ui-testing
    platform: iOS
    settings:
      base:
        PRODUCT_NAME: "$(TARGET_NAME)"
        PRODUCT_MODULE_NAME: "$(TARGET_NAME)"
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - path: UITests
    dependencies:
      - target: IrisChat
