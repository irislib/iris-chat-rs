name: IrisChat
options:
  bundleIdPrefix: fi.siriusbusiness.irischat
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: fi.siriusbusiness.irischat
    DEVELOPMENT_TEAM: 8G9P8AN75D
    MARKETING_VERSION: ${IRIS_XCODE_MARKETING_VERSION}
    CURRENT_PROJECT_VERSION: ${IRIS_APP_VERSION_CODE}
    VERSIONING_SYSTEM: apple-generic
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: 5.0

packages:
  FipsBle:
    path: FipsBle

schemes:
  IrisChat:
    build:
      targets:
        IrisChat: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - IrisChatTests
        - IrisChatUITests
    archive:
      config: Release

targets:
  IrisChat:
    type: application
    platform: iOS
    sources:
      - path: Assets.xcassets
      - path: Sources
      - path: Bindings
        excludes:
          - "*.h"
          - "*.modulemap"
    settings:
      base:
        PRODUCT_NAME: IrisChat
        CODE_SIGN_ENTITLEMENTS: IrisChat.entitlements
        DEFINES_MODULE: YES
        INFOPLIST_FILE: Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Iris Chat
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
      configs:
        Debug:
          APS_ENVIRONMENT: development
        Release:
          APS_ENVIRONMENT: production
          PROVISIONING_PROFILE_SPECIFIER: ${IRIS_IOS_PROVISIONING_PROFILE_UUID}
    dependencies:
      - framework: Frameworks/IrisChatCore.xcframework
        embed: false
      - target: NotificationService
      - target: ShareExtension
      - package: FipsBle

  NotificationService:
    type: app-extension
    platform: iOS
    sources:
      - path: NotificationService/NotificationService.swift
      - path: Sources/MobilePushDeliveryProbe.swift
      - path: Bindings
        excludes:
          - "*.h"
          - "*.modulemap"
    settings:
      base:
        PRODUCT_NAME: NotificationService
        PRODUCT_BUNDLE_IDENTIFIER: fi.siriusbusiness.irischat.NotificationService
        DEVELOPMENT_TEAM: 8G9P8AN75D
        CODE_SIGN_ENTITLEMENTS: NotificationService/NotificationService.entitlements
        INFOPLIST_FILE: NotificationService/Info.plist
        SKIP_INSTALL: YES
      configs:
        Release:
          PROVISIONING_PROFILE_SPECIFIER: ${IRIS_IOS_NOTIFICATION_PROVISIONING_PROFILE_UUID}
    dependencies:
      - framework: Frameworks/IrisChatCore.xcframework
        embed: false

  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension/ShareViewController.swift
    settings:
      base:
        PRODUCT_NAME: ShareExtension
        PRODUCT_BUNDLE_IDENTIFIER: fi.siriusbusiness.irischat.ShareExtension
        DEVELOPMENT_TEAM: 8G9P8AN75D
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
        INFOPLIST_FILE: ShareExtension/Info.plist
        SKIP_INSTALL: YES
      configs:
        Release:
          PROVISIONING_PROFILE_SPECIFIER: ${IRIS_IOS_SHARE_PROVISIONING_PROFILE_UUID}

  IrisChatTests:
    type: bundle.unit-test
    platform: iOS
    settings:
      base:
        PRODUCT_NAME: "$(TARGET_NAME)"
        PRODUCT_MODULE_NAME: "$(TARGET_NAME)"
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: IrisChat
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/IrisChat.app/IrisChat"
        BUNDLE_LOADER: "$(TEST_HOST)"
    sources:
      - path: Tests
    dependencies:
      - target: IrisChat

  IrisChatUITests:
    type: bundle.ui-testing
    platform: iOS
    settings:
      base:
        PRODUCT_NAME: "$(TARGET_NAME)"
        PRODUCT_MODULE_NAME: "$(TARGET_NAME)"
        GENERATE_INFOPLIST_FILE: YES
    sources:
      - path: UITests
    dependencies:
      - target: IrisChat
