name: IrisChatMac
options:
  bundleIdPrefix: to.iris.chat
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: to.iris.chat.macos
    MARKETING_VERSION: ${IRIS_XCODE_MARKETING_VERSION}
    CURRENT_PROJECT_VERSION: ${IRIS_APP_VERSION_CODE}
    VERSIONING_SYSTEM: apple-generic
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: 5.0
  configs:
    Debug:
      ENABLE_TESTABILITY: YES
      SWIFT_OPTIMIZATION_LEVEL: -Onone

packages:
  FipsBle:
    path: ../ios/FipsBle

schemes:
  IrisChatMac:
    build:
      targets:
        IrisChatMac: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - IrisChatMacTests
        - IrisChatMacUITests
    archive:
      config: Release

  IrisChatMacUI:
    build:
      targets:
        IrisChatMac: all
    run:
      config: Debug
    test:
      config: Debug
      debugEnabled: false
      targets:
        - IrisChatMacUITests

targets:
  IrisChatMac:
    type: application
    platform: macOS
    sources:
      - path: Assets.xcassets
      - path: ../ios/Sources
        excludes:
          - IrisChatApp.swift
      - path: ../ios/Bindings
        excludes:
          - "*.h"
          - "*.modulemap"
      - path: Sources
    settings:
      base:
        PRODUCT_NAME: Iris Chat
        PRODUCT_MODULE_NAME: IrisChatMac
        DEFINES_MODULE: YES
        CODE_SIGN_ENTITLEMENTS: IrisChatMac.entitlements
        PROVISIONING_PROFILE_SPECIFIER: $(IRIS_MACOS_PROVISIONING_PROFILE_SPECIFIER)
        INFOPLIST_FILE: Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Iris Chat
      configs:
        Release:
          CODE_SIGN_ENTITLEMENTS: Release.entitlements
    dependencies:
      - framework: Frameworks/IrisChatCore.xcframework
        embed: false
      - target: ShareExtension
      - package: FipsBle

  ShareExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: ShareExtension/ShareViewController.swift
    settings:
      base:
        PRODUCT_NAME: ShareExtension
        PRODUCT_BUNDLE_IDENTIFIER: to.iris.chat.macos.ShareExtension
        DEVELOPMENT_TEAM: J8PPJKD7TA
        CODE_SIGN_ENTITLEMENTS: ShareExtension/ShareExtension.entitlements
        PROVISIONING_PROFILE_SPECIFIER: $(IRIS_MACOS_SHARE_PROVISIONING_PROFILE_SPECIFIER)
        INFOPLIST_FILE: ShareExtension/Info.plist
        SKIP_INSTALL: YES

  IrisChatMacUITests:
    type: bundle.ui-testing
    platform: macOS
    settings:
      base:
        PRODUCT_NAME: "$(TARGET_NAME)"
        PRODUCT_MODULE_NAME: "$(TARGET_NAME)"
        PRODUCT_BUNDLE_IDENTIFIER: to.iris.chat.macos.uitests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: IrisChatMac
    sources:
      - path: ../ios/UITests
        excludes:
          - Fixtures
      - path: ../ios/UITests/Fixtures
        buildPhase: resources
        type: folder
    dependencies:
      - target: IrisChatMac

  # macOS unit-test bundle that re-uses the iOS Tests target source —
  # primarily so the InteropHarnessTests harness can drive a macOS
  # peer in the cross-platform group chat matrix without a separate
  # codebase. The harness stays platform-agnostic; the only macOS-
  # vs-iOS difference (UNUserNotificationCenter is more limited on
  # the Mac) is gated inside the harness itself.
  IrisChatMacTests:
    type: bundle.unit-test
    platform: macOS
    settings:
      base:
        PRODUCT_NAME: "$(TARGET_NAME)"
        PRODUCT_MODULE_NAME: "$(TARGET_NAME)"
        PRODUCT_BUNDLE_IDENTIFIER: to.iris.chat.macos.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: IrisChatMac
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Iris Chat.app/Contents/MacOS/Iris Chat"
        BUNDLE_LOADER: "$(TEST_HOST)"
    sources:
      - path: ../ios/Tests
    dependencies:
      - target: IrisChatMac
