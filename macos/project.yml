name: IrisChatMac
options:
  bundleIdPrefix: social.innode.irischat
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: social.innode.irischat.macos
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    VERSIONING_SYSTEM: apple-generic
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: 5.0

targets:
  IrisChatMac:
    type: application
    platform: macOS
    sources:
      - path: Assets.xcassets
      - path: ../ios/Sources
        excludes:
          - IrisChatApp.swift
      - path: ../ios/Bindings
        excludes:
          - "*.h"
          - "*.modulemap"
      - path: Sources
    settings:
      base:
        PRODUCT_NAME: Iris Chat
        DEFINES_MODULE: YES
        INFOPLIST_FILE: Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Iris Chat
    dependencies:
      - framework: Frameworks/NdrDemoCore.xcframework
        embed: false

  IrisChatMacUITests:
    type: bundle.ui-testing
    platform: macOS
    settings:
      base:
        PRODUCT_NAME: "$(TARGET_NAME)"
        PRODUCT_MODULE_NAME: "$(TARGET_NAME)"
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: IrisChatMac
    sources:
      - path: ../ios/UITests
        excludes:
          - Fixtures
      - path: ../ios/UITests/Fixtures
        buildPhase: resources
        type: folder
    dependencies:
      - target: IrisChatMac
