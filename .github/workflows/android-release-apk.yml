name: Android Release APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Optional app versionName, without leading v. Empty means next UTC calendar version from tags."
        required: false
        type: string
      version_code:
        description: "Optional Android versionCode override. Empty derives it from version_name."
        required: false
        type: string
      create_tag:
        description: "Create and push v<version_name> after the signed APK is built."
        required: true
        default: true
        type: boolean
      artifact_retention_days:
        description: "How long GitHub should keep the signed APK artifact."
        required: true
        default: "30"
        type: choice
        options:
          - "7"
          - "30"
          - "90"

permissions:
  contents: write

concurrency:
  group: android-release-apk-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_DIR: iris-chat-rs
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: ${{ github.workspace }}/cargo-target
  IRIS_RELEASE_RELAY_SET_ID: ${{ vars.IRIS_RELEASE_RELAY_SET_ID }}
  IRIS_RELEASE_RELAYS: ${{ vars.IRIS_RELEASE_RELAYS }}
  IRIS_MOBILE_PUSH_SERVER_URL: ${{ vars.IRIS_MOBILE_PUSH_SERVER_URL }}
  IRIS_UPDATE_MANIFEST_URL: ${{ vars.IRIS_UPDATE_MANIFEST_URL }}
  IRIS_UPDATE_POLL_SECONDS: ${{ vars.IRIS_UPDATE_POLL_SECONDS }}

jobs:
  signed-apk:
    name: Build signed APK
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    environment: android-release
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}

    steps:
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          path: ${{ env.APP_DIR }}
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add aarch64-linux-android

      - name: Install Android SDK components
        run: |
          set -Eeuo pipefail
          android_sdk_root="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [[ -z "$android_sdk_root" ]]; then
            echo "ANDROID_HOME or ANDROID_SDK_ROOT must be set." >&2
            exit 1
          fi
          sdkmanager_bin="$android_sdk_root/cmdline-tools/latest/bin/sdkmanager"
          yes | "$sdkmanager_bin" --licenses >/dev/null || true
          "$sdkmanager_bin" "platforms;android-36" "build-tools;36.0.0" "ndk;28.2.13676358"

      - name: Cache Cargo and Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.gradle/caches
            ~/.gradle/wrapper
            ${{ github.workspace }}/cargo-target
          key: android-release-${{ runner.os }}-${{ hashFiles('iris-chat-rs/**/Cargo.lock', 'iris-chat-rs/android/**/*.gradle*', 'iris-chat-rs/android/gradle/**/*.toml') }}
          restore-keys: |
            android-release-${{ runner.os }}-

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Resolve release version
        id: version
        env:
          INPUT_VERSION_NAME: ${{ inputs.version_name }}
          INPUT_VERSION_CODE: ${{ inputs.version_code }}
        run: |
          set -Eeuo pipefail
          source scripts/release_common.sh

          version_name="$INPUT_VERSION_NAME"
          version_name="${version_name#"v"}"
          if [[ -z "$version_name" ]]; then
            today="$(date -u +'%Y.%-m.%-d')"
            highest_suffix=-1

            if git rev-parse -q --verify "refs/tags/v${today}" >/dev/null; then
              highest_suffix=0
            fi

            tag_prefix="v${today}."
            while IFS= read -r tag; do
              suffix="${tag#"$tag_prefix"}"
              if [[ "$suffix" =~ ^[0-9]+$ && "$suffix" -gt "$highest_suffix" ]]; then
                highest_suffix="$suffix"
              fi
            done < <(git tag -l "v${today}.*")

            if [[ "$highest_suffix" -lt 0 ]]; then
              version_name="$today"
            else
              version_name="${today}.$((highest_suffix + 1))"
            fi
          fi

          export IRIS_APP_VERSION_NAME="$version_name"
          if [[ -n "$INPUT_VERSION_CODE" ]]; then
            if [[ ! "$INPUT_VERSION_CODE" =~ ^[0-9]+$ ]]; then
              echo "::error::version_code must be numeric."
              exit 1
            fi
            export IRIS_APP_VERSION_CODE="$INPUT_VERSION_CODE"
            export IRIS_APP_VERSION_CODE_MANUAL=true
          fi

          resolve_shared_build_metadata "$PWD"

          {
            echo "IRIS_APP_VERSION_NAME=$IRIS_APP_VERSION_NAME"
            echo "IRIS_APP_VERSION_CODE=$IRIS_APP_VERSION_CODE"
            echo "IRIS_BUILD_GIT_SHA=$IRIS_BUILD_GIT_SHA"
            echo "IRIS_BUILD_TIMESTAMP_UTC=$IRIS_BUILD_TIMESTAMP_UTC"
          } >> "$GITHUB_ENV"

          {
            echo "version_name=$IRIS_APP_VERSION_NAME"
            echo "version_code=$IRIS_APP_VERSION_CODE"
            echo "git_sha=$IRIS_BUILD_GIT_SHA"
          } >> "$GITHUB_OUTPUT"

      - name: Decode Android signing key
        env:
          IRIS_RELEASE_KEYSTORE_BASE64: ${{ secrets.IRIS_RELEASE_KEYSTORE_BASE64 }}
          IRIS_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.IRIS_RELEASE_KEYSTORE_PASSWORD }}
          IRIS_RELEASE_KEY_ALIAS: ${{ secrets.IRIS_RELEASE_KEY_ALIAS }}
          IRIS_RELEASE_KEY_PASSWORD: ${{ secrets.IRIS_RELEASE_KEY_PASSWORD }}
        run: |
          set -Eeuo pipefail
          for name in \
            IRIS_RELEASE_KEYSTORE_BASE64 \
            IRIS_RELEASE_KEYSTORE_PASSWORD \
            IRIS_RELEASE_KEY_ALIAS \
            IRIS_RELEASE_KEY_PASSWORD; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required android-release environment secret: $name"
              exit 1
            fi
          done

          signing_dir="$RUNNER_TEMP/iris-android-signing"
          mkdir -p "$signing_dir"
          chmod 700 "$signing_dir"
          keystore_path="$signing_dir/release.jks"
          printf '%s' "$IRIS_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"
          chmod 600 "$keystore_path"

          {
            echo "IRIS_RELEASE_KEYSTORE_PATH=$keystore_path"
            echo "IRIS_RELEASE_KEYSTORE_PASSWORD=$IRIS_RELEASE_KEYSTORE_PASSWORD"
            echo "IRIS_RELEASE_KEY_ALIAS=$IRIS_RELEASE_KEY_ALIAS"
            echo "IRIS_RELEASE_KEY_PASSWORD=$IRIS_RELEASE_KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Verify signing key alias
        run: |
          set -Eeuo pipefail
          keytool -list \
            -keystore "$IRIS_RELEASE_KEYSTORE_PATH" \
            -storepass "$IRIS_RELEASE_KEYSTORE_PASSWORD" \
            -alias "$IRIS_RELEASE_KEY_ALIAS" >/dev/null

      - name: Build signed self-hosted release APK
        run: |
          set -Eeuo pipefail
          ./scripts/android-release print-config
          ./scripts/android-release release-apk

      - name: Verify APK and write release metadata
        id: apk
        run: |
          set -Eeuo pipefail
          build_tools="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}/build-tools/36.0.0"
          apk="$(ls -1 "dist/android/IrisChat-release-${IRIS_APP_VERSION_NAME}+${IRIS_APP_VERSION_CODE}-${IRIS_BUILD_GIT_SHA}.apk")"
          manifest="dist/android/IrisChat-release-${IRIS_APP_VERSION_NAME}+${IRIS_APP_VERSION_CODE}-${IRIS_BUILD_GIT_SHA}.env"
          apksigner_report="dist/android/IrisChat-release-${IRIS_APP_VERSION_NAME}+${IRIS_APP_VERSION_CODE}-${IRIS_BUILD_GIT_SHA}.apksigner.txt"
          badging_report="dist/android/IrisChat-release-${IRIS_APP_VERSION_NAME}+${IRIS_APP_VERSION_CODE}-${IRIS_BUILD_GIT_SHA}.badging.txt"
          metadata="dist/android/IrisChat-release-${IRIS_APP_VERSION_NAME}+${IRIS_APP_VERSION_CODE}-${IRIS_BUILD_GIT_SHA}.metadata.env"

          "$build_tools/apksigner" verify --verbose --print-certs "$apk" > "$apksigner_report"
          "$build_tools/aapt" dump badging "$apk" > "$badging_report"
          sha256sum "$apk" > "${apk}.sha256"

          package_name="$(sed -nE "s/^package: name='([^']+)'.*/\\1/p" "$badging_report" | head -n 1)"
          apk_version_code="$(sed -nE "s/^package: .*versionCode='([^']+)'.*/\\1/p" "$badging_report" | head -n 1)"
          apk_version_name="$(sed -nE "s/^package: .*versionName='([^']+)'.*/\\1/p" "$badging_report" | head -n 1)"
          cert_sha256="$(sed -nE 's/^Signer #1 certificate SHA-256 digest: //p' "$apksigner_report" | head -n 1)"
          apk_sha256="$(cut -d ' ' -f 1 "${apk}.sha256")"

          if [[ "$package_name" != "to.iris.chat" ]]; then
            echo "::error::Unexpected APK package: $package_name"
            exit 1
          fi
          if [[ "$apk_version_name" != "$IRIS_APP_VERSION_NAME" ]]; then
            echo "::error::APK versionName $apk_version_name did not match $IRIS_APP_VERSION_NAME"
            exit 1
          fi
          if [[ "$apk_version_code" != "$IRIS_APP_VERSION_CODE" ]]; then
            echo "::error::APK versionCode $apk_version_code did not match $IRIS_APP_VERSION_CODE"
            exit 1
          fi

          cp "$manifest" "dist/android/IrisChat-release-latest.env"

          {
            echo "artifact_path=$apk"
            echo "package_name=$package_name"
            echo "app_version_name=$IRIS_APP_VERSION_NAME"
            echo "app_version_code=$IRIS_APP_VERSION_CODE"
            echo "build_git_sha=$IRIS_BUILD_GIT_SHA"
            echo "build_timestamp_utc=$IRIS_BUILD_TIMESTAMP_UTC"
            echo "apk_sha256=$apk_sha256"
            echo "signing_cert_sha256=$cert_sha256"
          } > "$metadata"

          {
            echo "apk_path=$apk"
            echo "apk_name=$(basename "$apk")"
            echo "apk_sha256=$apk_sha256"
            echo "signing_cert_sha256=$cert_sha256"
          } >> "$GITHUB_OUTPUT"

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: iris-chat-android-release-${{ steps.version.outputs.version_name }}-${{ steps.version.outputs.git_sha }}
          path: |
            iris-chat-rs/dist/android/*.apk
            iris-chat-rs/dist/android/*.env
            iris-chat-rs/dist/android/*.metadata.env
            iris-chat-rs/dist/android/*.sha256
            iris-chat-rs/dist/android/*.apksigner.txt
            iris-chat-rs/dist/android/*.badging.txt
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}

      - name: Create version tag
        if: ${{ inputs.create_tag }}
        run: |
          set -Eeuo pipefail
          tag="v${IRIS_APP_VERSION_NAME}"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Android release APK ${tag}" "$GITHUB_SHA"
          git push origin "refs/tags/${tag}"

      - name: Job summary
        run: |
          set -Eeuo pipefail
          {
            echo "## Android release APK"
            echo
            echo "- APK: \`${{ steps.apk.outputs.apk_name }}\`"
            echo "- versionName: \`${IRIS_APP_VERSION_NAME}\`"
            echo "- versionCode: \`${IRIS_APP_VERSION_CODE}\`"
            echo "- APK SHA-256: \`${{ steps.apk.outputs.apk_sha256 }}\`"
            echo "- signing cert SHA-256: \`${{ steps.apk.outputs.signing_cert_sha256 }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
