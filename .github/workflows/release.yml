name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, for example v2026.7.22."
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  verify:
    name: Verify release inputs and core gate
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Validate tag and release notes
        run: |
          set -Eeuo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+(\.[0-9]+){2,3}(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Unsupported release tag: $RELEASE_TAG"
            exit 1
          fi
          if ! git rev-parse -q --verify "refs/tags/$RELEASE_TAG^{commit}" >/dev/null; then
            echo "::error::Release tag does not exist: $RELEASE_TAG"
            exit 1
          fi
          if [[ "$(git rev-parse HEAD)" != "$(git rev-parse "refs/tags/$RELEASE_TAG^{commit}")" ]]; then
            echo "::error::Checkout does not match $RELEASE_TAG"
            exit 1
          fi

          version="${RELEASE_TAG#v}"
          grep -Fxq "## $version" CHANGELOG.md || {
            echo "::error::CHANGELOG.md has no ## $version section"
            exit 1
          }
          grep -Fxq "# Iris Chat $version" ZAPSTORE_RELEASE_NOTES.md || {
            echo "::error::ZAPSTORE_RELEASE_NOTES.md has no Iris Chat $version section"
            exit 1
          }

          source scripts/release_common.sh
          semantic_version_code "$version" >/dev/null || {
            echo "::error::The tag cannot be converted to a shared app version code"
            exit 1
          }

      - name: Install Rust and native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Cache Cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core/target
          key: release-gate-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: release-gate-${{ runner.os }}-

      - name: Run hosted release gate
        run: |
          set -Eeuo pipefail
          python3 scripts/test_release_notes.py
          scripts/verify.sh fast
          scripts/test_release_publish_guard
          scripts/test_homebrew_tap

  build:
    name: Build release artifacts
    needs: verify
    uses: ./.github/workflows/build-artifacts.yml
    with:
      ref: ${{ inputs.tag || github.ref_name }}
      artifact_retention_days: 7
      sign_macos: true
    secrets: inherit

  release:
    name: Create GitHub release
    needs:
      - verify
      - build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Verify release set
        shell: bash
        run: |
          set -Eeuo pipefail
          required_patterns=(
            'IrisChat-release-*.apk'
            'IrisChat-release-*.aab'
            '*.ipa'
            '*.xcarchive.zip'
            'iris-chat-v*-macos-arm64.dmg'
            'iris-chat-v*-macos-arm64.app.tar.gz'
            'iris-chat-v*-windows-x64-setup.exe'
            'iris-chat-v*-windows-x64.zip'
            'iris-chat-v*-linux-x64.deb'
            'iris-chat-v*-linux-x64.tar.gz'
            'iris-aarch64-apple-darwin.tar.gz'
            'iris-x86_64-apple-darwin.tar.gz'
            'iris-x86_64-unknown-linux-gnu.tar.gz'
          )
          for pattern in "${required_patterns[@]}"; do
            if ! compgen -G "artifacts/$pattern" >/dev/null; then
              echo "::error::Missing release artifact matching $pattern"
              exit 1
            fi
          done

      - name: Render release notes
        run: |
          scripts/render-release-notes.py \
            --tag "$RELEASE_TAG" \
            --commit "$(git rev-parse HEAD)" \
            --asset-dir artifacts \
            --asset-base-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}" \
            --changelog CHANGELOG.md \
            --verification-line "GitHub artifact attestations record build provenance for the release files." \
            --out release-notes.md

      - name: Attest release build provenance
        uses: actions/attest@v4
        with:
          subject-path: artifacts/*

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Iris Chat ${{ env.RELEASE_TAG }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          fail_on_unmatched_files: true
          files: artifacts/*
