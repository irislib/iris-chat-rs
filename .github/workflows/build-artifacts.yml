name: Build artifacts

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to build."
        required: true
        type: string
      artifact_retention_days:
        description: "How long GitHub should retain build artifacts."
        required: false
        default: 7
        type: number
      sign_macos:
        description: "Sign and notarize macOS artifacts with the macos-release environment."
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build. It is resolved to one immutable commit before jobs start."
        required: true
        default: main
        type: string
      artifact_retention_days:
        description: "How long GitHub should retain build artifacts."
        required: true
        default: "30"
        type: choice
        options: ["7", "30", "90"]
      sign_macos:
        description: "Sign and notarize the macOS app. Requires the macos-release environment."
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: build-artifacts-${{ inputs.ref }}
  cancel-in-progress: false

env:
  APP_DIR: iris-chat-rs
  CARGO_TERM_COLOR: always
  IRIS_RELEASE_RELAY_SET_ID: ${{ vars.IRIS_RELEASE_RELAY_SET_ID || 'public-release' }}
  IRIS_RELEASE_RELAYS: ${{ vars.IRIS_RELEASE_RELAYS || 'wss://relay.damus.io,wss://nos.lol,wss://relay.primal.net,wss://relay.snort.social,wss://temp.iris.to' }}
  IRIS_RELAY_SET_ID: ${{ vars.IRIS_RELEASE_RELAY_SET_ID || 'public-release' }}
  IRIS_DEFAULT_RELAYS: ${{ vars.IRIS_RELEASE_RELAYS || 'wss://relay.damus.io,wss://nos.lol,wss://relay.primal.net,wss://relay.snort.social,wss://temp.iris.to' }}
  IRIS_MOBILE_PUSH_SERVER_URL: ${{ vars.IRIS_MOBILE_PUSH_SERVER_URL }}
  IRIS_UPDATE_MANIFEST_URL: ${{ vars.IRIS_UPDATE_MANIFEST_URL }}
  IRIS_UPDATE_POLL_SECONDS: ${{ vars.IRIS_UPDATE_POLL_SECONDS }}

jobs:
  metadata:
    name: Resolve build identity
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      commit: ${{ steps.metadata.outputs.commit }}
      short_sha: ${{ steps.metadata.outputs.short_sha }}
      version_name: ${{ steps.metadata.outputs.version_name }}
      version_code: ${{ steps.metadata.outputs.version_code }}
      build_timestamp_utc: ${{ steps.metadata.outputs.build_timestamp_utc }}
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}
    steps:
      - name: Checkout requested ref
        uses: actions/checkout@v7
        with:
          path: ${{ env.APP_DIR }}
          ref: ${{ inputs.ref }}
          fetch-depth: 1

      - name: Resolve build identity
        id: metadata
        env:
          REQUESTED_REF: ${{ inputs.ref }}
        run: |
          set -Eeuo pipefail
          source scripts/release_common.sh
          commit="$(git rev-parse HEAD)"
          requested_tag="${REQUESTED_REF#refs/tags/}"
          if [[ "$requested_tag" =~ ^v([0-9]+(\.[0-9]+){2,3}([-+][0-9A-Za-z.-]+)?)$ ]]; then
            version_name="${BASH_REMATCH[1]}"
          else
            version_name="$(TZ=UTC git log -1 --format=%cd --date=format:'%Y.%-m.%-d' HEAD)"
          fi
          version_code="$(semantic_version_code "$version_name")"
          build_timestamp_utc="$(TZ=UTC git log -1 --format=%cd --date=format:'%Y-%m-%dT%H:%M:%SZ' HEAD)"
          {
            echo "commit=$commit"
            echo "short_sha=${commit:0:12}"
            echo "version_name=$version_name"
            echo "version_code=$version_code"
            echo "build_timestamp_utc=$build_timestamp_utc"
          } >> "$GITHUB_OUTPUT"

  android:
    name: Android APK and AAB
    needs: metadata
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    environment: android-release
    env: &build_metadata
      CARGO_TARGET_DIR: ${{ github.workspace }}/cargo-target
      IRIS_APP_VERSION_NAME: ${{ needs.metadata.outputs.version_name }}
      IRIS_APP_VERSION_CODE: ${{ needs.metadata.outputs.version_code }}
      IRIS_BUILD_GIT_SHA: ${{ needs.metadata.outputs.short_sha }}
      IRIS_BUILD_TIMESTAMP_UTC: ${{ needs.metadata.outputs.build_timestamp_utc }}
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}
    steps:
      - &checkout_build
        name: Checkout immutable build commit
        uses: actions/checkout@v7
        with:
          path: ${{ env.APP_DIR }}
          ref: ${{ needs.metadata.outputs.commit }}
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - name: Install Rust and Android components
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add aarch64-linux-android
          cargo install cargo-ndk --locked
          sdk_root="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          sdkmanager="$sdk_root/cmdline-tools/latest/bin/sdkmanager"
          yes | "$sdkmanager" --licenses >/dev/null || true
          "$sdkmanager" "platforms;android-36" "build-tools;36.0.0" "ndk;28.2.13676358"
      - name: Cache Cargo and Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.gradle/caches
            ~/.gradle/wrapper
            ${{ github.workspace }}/cargo-target
          key: all-builds-android-${{ hashFiles('iris-chat-rs/**/Cargo.lock', 'iris-chat-rs/android/**/*.gradle*') }}
          restore-keys: all-builds-android-
      - name: Configure Android signing
        env:
          KEYSTORE_BASE64: ${{ secrets.IRIS_RELEASE_KEYSTORE_BASE64 }}
          IRIS_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.IRIS_RELEASE_KEYSTORE_PASSWORD }}
          IRIS_RELEASE_KEY_ALIAS: ${{ secrets.IRIS_RELEASE_KEY_ALIAS }}
          IRIS_RELEASE_KEY_PASSWORD: ${{ secrets.IRIS_RELEASE_KEY_PASSWORD }}
        run: |
          set -Eeuo pipefail
          : "${KEYSTORE_BASE64:?Missing Android keystore secret}"
          : "${IRIS_RELEASE_KEYSTORE_PASSWORD:?Missing Android keystore password}"
          : "${IRIS_RELEASE_KEY_ALIAS:?Missing Android key alias}"
          : "${IRIS_RELEASE_KEY_PASSWORD:?Missing Android key password}"
          keystore="$RUNNER_TEMP/iris-release.jks"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$keystore"
          chmod 600 "$keystore"
          {
            echo "IRIS_RELEASE_KEYSTORE_PATH=$keystore"
            echo "IRIS_RELEASE_KEYSTORE_PASSWORD=$IRIS_RELEASE_KEYSTORE_PASSWORD"
            echo "IRIS_RELEASE_KEY_ALIAS=$IRIS_RELEASE_KEY_ALIAS"
            echo "IRIS_RELEASE_KEY_PASSWORD=$IRIS_RELEASE_KEY_PASSWORD"
          } >> "$GITHUB_ENV"
      - name: Build and verify signed artifacts
        run: |
          set -Eeuo pipefail
          ./scripts/android-release release-artifacts
          base="IrisChat-release-${IRIS_APP_VERSION_NAME}+${IRIS_APP_VERSION_CODE}-${IRIS_BUILD_GIT_SHA}"
          apk="dist/android/${base}.apk"
          aab="dist/android/${base}.aab"
          build_tools="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}/build-tools/36.0.0"
          "$build_tools/apksigner" verify --verbose --print-certs "$apk"
          jarsigner -verify "$aab" 2>&1 | grep '^jar verified' >/dev/null
      - name: Upload Android build
        uses: actions/upload-artifact@v7
        with:
          name: iris-android-${{ needs.metadata.outputs.version_name }}-${{ needs.metadata.outputs.short_sha }}
          path: |
            ${{ env.APP_DIR }}/dist/android/*.apk
            ${{ env.APP_DIR }}/dist/android/*.aab
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}

  ios:
    name: iOS archive and IPA
    needs: metadata
    runs-on: macos-15
    timeout-minutes: 120
    environment: ios-build
    env: *build_metadata
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}
    steps:
      - *checkout_build
      - name: Install build tools
        run: |
          set -Eeuo pipefail
          brew list xcodegen >/dev/null 2>&1 || brew install xcodegen
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add aarch64-apple-ios aarch64-apple-ios-sim
      - name: Cache Cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ github.workspace }}/cargo-target
          key: all-builds-ios-${{ runner.arch }}-${{ hashFiles('iris-chat-rs/**/Cargo.lock', 'iris-chat-rs/ios/project.yml') }}
          restore-keys: all-builds-ios-${{ runner.arch }}-
      - name: Configure iOS distribution signing
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_SIGNING_IDENTITY: ${{ secrets.IOS_SIGNING_IDENTITY }}
          IOS_APP_PROFILE_BASE64: ${{ secrets.IRIS_IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_APP_PROFILE_UUID: ${{ secrets.IRIS_IOS_PROVISIONING_PROFILE_UUID }}
          IOS_NOTIFICATION_PROFILE_BASE64: ${{ secrets.IRIS_IOS_NOTIFICATION_PROVISIONING_PROFILE_BASE64 }}
          IOS_NOTIFICATION_PROFILE_UUID: ${{ secrets.IRIS_IOS_NOTIFICATION_PROVISIONING_PROFILE_UUID }}
          IOS_SHARE_PROFILE_BASE64: ${{ secrets.IRIS_IOS_SHARE_PROVISIONING_PROFILE_BASE64 }}
          IOS_SHARE_PROFILE_UUID: ${{ secrets.IRIS_IOS_SHARE_PROVISIONING_PROFILE_UUID }}
          IOS_BUNDLE_ID: ${{ vars.IRIS_IOS_BUNDLE_ID }}
          IOS_TEAM: ${{ vars.IRIS_IOS_DEVELOPMENT_TEAM }}
        run: |
          set -Eeuo pipefail
          for name in \
            IOS_CERTIFICATE_P12_BASE64 \
            IOS_CERTIFICATE_PASSWORD \
            IOS_SIGNING_IDENTITY \
            IOS_APP_PROFILE_BASE64 \
            IOS_APP_PROFILE_UUID \
            IOS_NOTIFICATION_PROFILE_BASE64 \
            IOS_NOTIFICATION_PROFILE_UUID \
            IOS_SHARE_PROFILE_BASE64 \
            IOS_SHARE_PROFILE_UUID \
            IOS_BUNDLE_ID \
            IOS_TEAM; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required ios-build setting: $name"
              exit 1
            fi
          done

          signing_dir="$RUNNER_TEMP/iris-ios-signing"
          keychain="$RUNNER_TEMP/iris-ios-release.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          profile_dir="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          mkdir -p "$signing_dir" "$profile_dir"
          chmod 700 "$signing_dir"

          certificate="$signing_dir/ios-distribution.p12"
          printf '%s' "$IOS_CERTIFICATE_P12_BASE64" | /usr/bin/base64 -D > "$certificate"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$certificate" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain"
          security list-keychains -d user -s "$keychain" login.keychain-db
          security default-keychain -s "$keychain"
          security find-identity -v -p codesigning "$keychain" | grep -F "$IOS_SIGNING_IDENTITY" >/dev/null

          app_profile="$profile_dir/${IOS_APP_PROFILE_UUID}.mobileprovision"
          notification_profile="$profile_dir/${IOS_NOTIFICATION_PROFILE_UUID}.mobileprovision"
          share_profile="$profile_dir/${IOS_SHARE_PROFILE_UUID}.mobileprovision"
          printf '%s' "$IOS_APP_PROFILE_BASE64" | /usr/bin/base64 -D > "$app_profile"
          printf '%s' "$IOS_NOTIFICATION_PROFILE_BASE64" | /usr/bin/base64 -D > "$notification_profile"
          printf '%s' "$IOS_SHARE_PROFILE_BASE64" | /usr/bin/base64 -D > "$share_profile"
          chmod 600 "$certificate" "$app_profile" "$notification_profile" "$share_profile"

          verify_profile() {
            local profile="$1"
            local expected_app_id="$2"
            local expected_app_group="group.$IOS_BUNDLE_ID"
            local decoded_profile="$signing_dir/$(basename "$profile").plist"
            local actual_uuid actual_app_id actual_app_groups
            security cms -D -i "$profile" > "$decoded_profile"
            actual_uuid="$(plutil -extract UUID raw -o - "$decoded_profile")"
            actual_app_id="$(plutil -extract Entitlements.application-identifier raw -o - "$decoded_profile")"
            actual_app_groups="$(
              /usr/libexec/PlistBuddy \
                -c 'Print :Entitlements:com.apple.security.application-groups' \
                "$decoded_profile" 2>/dev/null \
                | sed -n 's/^[[:space:]]*//; /^group\./p'
            )"
            if [[ "$actual_uuid" != "$(basename "$profile" .mobileprovision)" ]]; then
              echo "::error::iOS profile UUID does not match its configured filename"
              return 1
            fi
            if [[ "$actual_app_id" != "$IOS_TEAM.$expected_app_id" ]]; then
              echo "::error::iOS profile does not authorize $expected_app_id"
              return 1
            fi
            if ! grep -Fx "$expected_app_group" <<< "$actual_app_groups" >/dev/null; then
              echo "::error::iOS profile for $expected_app_id does not authorize $expected_app_group"
              return 1
            fi
          }
          verify_profile "$app_profile" "$IOS_BUNDLE_ID"
          verify_profile "$notification_profile" "$IOS_BUNDLE_ID.NotificationService"
          verify_profile "$share_profile" "$IOS_BUNDLE_ID.ShareExtension"

          {
            echo "IRIS_IOS_BUNDLE_ID=$IOS_BUNDLE_ID"
            echo "IRIS_IOS_DEVELOPMENT_TEAM=$IOS_TEAM"
            echo "IRIS_IOS_SIGNING_STYLE=manual"
            echo "IRIS_IOS_CODE_SIGN_IDENTITY=$IOS_SIGNING_IDENTITY"
            echo "IRIS_IOS_PROVISIONING_PROFILE_UUID=$IOS_APP_PROFILE_UUID"
            echo "IRIS_IOS_NOTIFICATION_PROVISIONING_PROFILE_UUID=$IOS_NOTIFICATION_PROFILE_UUID"
            echo "IRIS_IOS_SHARE_PROVISIONING_PROFILE_UUID=$IOS_SHARE_PROFILE_UUID"
            echo "IRIS_IOS_EXPORT_METHOD=app-store-connect"
            echo "IRIS_IOS_ALLOW_PROVISIONING_UPDATES=false"
            echo "IRIS_IOS_ATTACH_INTERNAL_AFTER_UPLOAD=false"
            echo "IRIS_IOS_KEYCHAIN_PATH=$keychain"
            echo "IRIS_IOS_APP_PROFILE_PATH=$app_profile"
            echo "IRIS_IOS_NOTIFICATION_PROFILE_PATH=$notification_profile"
            echo "IRIS_IOS_SHARE_PROFILE_PATH=$share_profile"
          } >> "$GITHUB_ENV"
      - name: Build and verify iOS artifacts
        run: |
          set -Eeuo pipefail
          ./scripts/ios-release archive
          ./scripts/ios-release export
          archive="$(find dist/ios -maxdepth 1 -type d -name '*.xcarchive' | head -n 1)"
          ipa="$(find dist/ios -type f -name '*.ipa' | head -n 1)"
          test -f "$ipa"
          app="$(find "$archive/Products/Applications" -maxdepth 1 -type d -name '*.app' | head -n 1)"
          codesign --verify --deep --strict --verbose=2 "$app"
          archive_zip="dist/ios/iris-chat-v${IRIS_APP_VERSION_NAME}-ios.xcarchive.zip"
          ditto -c -k --sequesterRsrc --keepParent "$archive" "$archive_zip"
      - name: Upload iOS build
        uses: actions/upload-artifact@v7
        with:
          name: iris-ios-${{ needs.metadata.outputs.version_name }}-${{ needs.metadata.outputs.short_sha }}
          path: |
            ${{ env.APP_DIR }}/dist/ios/**/*.ipa
            ${{ env.APP_DIR }}/dist/ios/*.xcarchive.zip
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}
      - name: Remove temporary iOS signing material
        if: ${{ always() }}
        run: |
          security default-keychain -s login.keychain-db || true
          security list-keychains -d user -s login.keychain-db || true
          if [[ -n "${IRIS_IOS_KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$IRIS_IOS_KEYCHAIN_PATH" || true
          fi
          rm -f \
            "${IRIS_IOS_APP_PROFILE_PATH:-}" \
            "${IRIS_IOS_NOTIFICATION_PROFILE_PATH:-}" \
            "${IRIS_IOS_SHARE_PROFILE_PATH:-}"

  macos:
    name: macOS DMG and app archive
    needs: metadata
    runs-on: macos-15
    timeout-minutes: 120
    environment: macos-release
    env: *build_metadata
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.APP_DIR }}
    steps:
      - *checkout_build
      - name: Install build tools
        run: |
          set -Eeuo pipefail
          brew list xcodegen >/dev/null 2>&1 || brew install xcodegen
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add aarch64-apple-darwin
      - name: Cache Cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ github.workspace }}/cargo-target
            ${{ github.workspace }}/${{ env.APP_DIR }}/macos/.build/cargo-target
          key: all-builds-macos-${{ runner.arch }}-${{ hashFiles('iris-chat-rs/**/Cargo.lock', 'iris-chat-rs/macos/project.yml') }}
          restore-keys: all-builds-macos-${{ runner.arch }}-
      - name: Configure macOS signing and notarization
        if: ${{ inputs.sign_macos }}
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_APP_PROFILE_BASE64: ${{ secrets.IRIS_MACOS_PROVISIONING_PROFILE_BASE64 }}
          MACOS_APP_PROFILE_SPECIFIER: ${{ secrets.IRIS_MACOS_PROVISIONING_PROFILE_SPECIFIER }}
          MACOS_SHARE_PROFILE_BASE64: ${{ secrets.IRIS_MACOS_SHARE_PROVISIONING_PROFILE_BASE64 }}
          MACOS_SHARE_PROFILE_SPECIFIER: ${{ secrets.IRIS_MACOS_SHARE_PROVISIONING_PROFILE_SPECIFIER }}
          ASC_PRIVATE_KEY_P8: ${{ secrets.ASC_PRIVATE_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -Eeuo pipefail
          for name in \
            MACOS_CERTIFICATE_P12_BASE64 \
            MACOS_CERTIFICATE_PASSWORD \
            MACOS_SIGNING_IDENTITY \
            MACOS_APP_PROFILE_BASE64 \
            MACOS_APP_PROFILE_SPECIFIER \
            MACOS_SHARE_PROFILE_BASE64 \
            MACOS_SHARE_PROFILE_SPECIFIER \
            ASC_PRIVATE_KEY_P8 \
            ASC_KEY_ID \
            ASC_ISSUER_ID; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required macos-release secret: $name"
              exit 1
            fi
          done

          signing_dir="$RUNNER_TEMP/iris-macos-signing"
          keychain="$RUNNER_TEMP/iris-release.keychain-db"
          keychain_password="$(openssl rand -hex 24)"
          profile_dir="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          mkdir -p "$signing_dir" "$profile_dir"
          chmod 700 "$signing_dir"

          certificate="$signing_dir/developer-id.p12"
          printf '%s' "$MACOS_CERTIFICATE_P12_BASE64" | /usr/bin/base64 -D > "$certificate"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$certificate" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain"
          security list-keychains -d user -s "$keychain" login.keychain-db
          security default-keychain -s "$keychain"
          security find-identity -v -p codesigning "$keychain" | grep -F "$MACOS_SIGNING_IDENTITY" >/dev/null

          app_profile="$profile_dir/${MACOS_APP_PROFILE_SPECIFIER}.provisionprofile"
          share_profile="$profile_dir/${MACOS_SHARE_PROFILE_SPECIFIER}.provisionprofile"
          printf '%s' "$MACOS_APP_PROFILE_BASE64" | /usr/bin/base64 -D > "$app_profile"
          printf '%s' "$MACOS_SHARE_PROFILE_BASE64" | /usr/bin/base64 -D > "$share_profile"

          notary_key="$signing_dir/AuthKey_${ASC_KEY_ID}.p8"
          printf '%b\n' "$ASC_PRIVATE_KEY_P8" > "$notary_key"
          chmod 600 "$certificate" "$app_profile" "$share_profile" "$notary_key"

          {
            echo "MACOS_SIGNING_IDENTITY=$MACOS_SIGNING_IDENTITY"
            echo "IRIS_MACOS_PROVISIONING_PROFILE_SPECIFIER=$MACOS_APP_PROFILE_SPECIFIER"
            echo "IRIS_MACOS_SHARE_PROVISIONING_PROFILE_SPECIFIER=$MACOS_SHARE_PROFILE_SPECIFIER"
            echo "IRIS_ASC_AUTH_KEY_PATH=$notary_key"
            echo "IRIS_ASC_AUTH_KEY_ID=$ASC_KEY_ID"
            echo "IRIS_ASC_AUTH_KEY_ISSUER_ID=$ASC_ISSUER_ID"
            echo "IRIS_MACOS_KEYCHAIN_PATH=$keychain"
            echo "IRIS_MACOS_APP_PROFILE_PATH=$app_profile"
            echo "IRIS_MACOS_SHARE_PROFILE_PATH=$share_profile"
          } >> "$GITHUB_ENV"
      - name: Build and verify macOS artifacts
        env:
          IRIS_RELEASE_TAG: v${{ needs.metadata.outputs.version_name }}
          SIGN_MACOS: ${{ inputs.sign_macos }}
        run: |
          set -Eeuo pipefail
          ./scripts/macos-build macos-dmg
          IRIS_MACOS_FORCE_REBUILD_APP=false ./scripts/macos-build macos-updater-archive

          app="dist/macos/Iris Chat.app"
          dmg="dist/macos/iris-chat-v${IRIS_APP_VERSION_NAME}-macos-arm64.dmg"
          archive="dist/macos/iris-chat-v${IRIS_APP_VERSION_NAME}-macos-arm64.app.tar.gz"
          test -x "$app/Contents/MacOS/Iris Chat"
          hdiutil verify "$dmg"
          tar -tzf "$archive" | grep -F 'Iris Chat.app/Contents/MacOS/Iris Chat' >/dev/null

          if [[ "$SIGN_MACOS" == "true" ]]; then
            codesign --verify --deep --strict --verbose=2 "$app"
            xcrun stapler validate "$app"
            xcrun stapler validate "$dmg"
            spctl --assess --type execute --verbose=2 "$app"
          fi
          IRIS_MACOS_APP_SMOKE_PATH="$app" ./scripts/macos-app-launch-smoke.sh
      - name: Upload macOS build
        uses: actions/upload-artifact@v7
        with:
          name: iris-macos-${{ needs.metadata.outputs.version_name }}-${{ needs.metadata.outputs.short_sha }}
          path: |
            ${{ env.APP_DIR }}/dist/macos/*.dmg
            ${{ env.APP_DIR }}/dist/macos/*.app.tar.gz
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}
      - name: Remove temporary signing material
        if: ${{ always() && inputs.sign_macos }}
        run: |
          security default-keychain -s login.keychain-db || true
          security list-keychains -d user -s login.keychain-db || true
          if [[ -n "${IRIS_MACOS_KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$IRIS_MACOS_KEYCHAIN_PATH" || true
          fi
          rm -f \
            "${IRIS_MACOS_APP_PROFILE_PATH:-}" \
            "${IRIS_MACOS_SHARE_PROFILE_PATH:-}"

  windows:
    name: Windows installer and portable ZIP
    needs: metadata
    runs-on: windows-2025
    timeout-minutes: 120
    env: *build_metadata
    defaults:
      run:
        shell: pwsh
        working-directory: ${{ env.APP_DIR }}
    steps:
      - *checkout_build
      - name: Install build tools
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add x86_64-pc-windows-msvc
          choco install nsis --no-progress -y
      - name: Cache Cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ github.workspace }}/cargo-target
          key: all-builds-windows-${{ hashFiles('iris-chat-rs/**/Cargo.lock', 'iris-chat-rs/windows/**/*.csproj') }}
          restore-keys: all-builds-windows-
      - name: Build and verify Windows artifacts
        run: |
          ./scripts/windows-build-local.ps1 artifacts
          $installer = "dist/windows/iris-chat-v$env:IRIS_APP_VERSION_NAME-windows-x64-setup.exe"
          $zip = "dist/windows/iris-chat-v$env:IRIS_APP_VERSION_NAME-windows-x64.zip"
          if (-not (Test-Path $installer) -or -not (Test-Path $zip)) { throw 'Windows artifacts are missing' }
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $entries = [IO.Compression.ZipFile]::OpenRead((Resolve-Path $zip)).Entries.FullName
          if ('IrisChat.exe' -notin $entries -or 'iris_chat_core.dll' -notin $entries) {
            throw 'Portable ZIP is missing IrisChat.exe or iris_chat_core.dll'
          }
          & ./scripts/windows-installer-smoke.ps1 -InstallerPath $installer
      - name: Upload Windows build
        uses: actions/upload-artifact@v7
        with:
          name: iris-windows-${{ needs.metadata.outputs.version_name }}-${{ needs.metadata.outputs.short_sha }}
          path: |
            ${{ env.APP_DIR }}/dist/windows/*.exe
            ${{ env.APP_DIR }}/dist/windows/*.zip
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}

  linux:
    name: Linux DEB and tarball
    needs: metadata
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env: *build_metadata
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}
    steps:
      - *checkout_build
      - name: Build and verify Linux artifacts
        run: |
          set -Eeuo pipefail
          ./scripts/linux-release
          deb="dist/linux/iris-chat-v${IRIS_APP_VERSION_NAME}-linux-x64.deb"
          archive="dist/linux/iris-chat-v${IRIS_APP_VERSION_NAME}-linux-x64.tar.gz"
          dpkg-deb --info "$deb" >/dev/null
          tar -tzf "$archive" | grep '/iris-chat$' >/dev/null
      - name: Upload Linux build
        uses: actions/upload-artifact@v7
        with:
          name: iris-linux-${{ needs.metadata.outputs.version_name }}-${{ needs.metadata.outputs.short_sha }}
          path: |
            ${{ env.APP_DIR }}/dist/linux/*.deb
            ${{ env.APP_DIR }}/dist/linux/*.tar.gz
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}

  cli:
    name: CLI ${{ matrix.target }}
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            target: aarch64-apple-darwin
            platform: cli-macos-arm64
          - runner: macos-15
            target: x86_64-apple-darwin
            platform: cli-macos-x64
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            platform: cli-linux-x64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    env: *build_metadata
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.APP_DIR }}
    steps:
      - *checkout_build
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdbus-1-dev pkg-config
      - name: Install Rust target
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.target }}"
      - name: Cache Cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ${{ github.workspace }}/cargo-target
            ${{ github.workspace }}/${{ env.APP_DIR }}/target/cli-release
          key: all-builds-${{ matrix.platform }}-${{ hashFiles('iris-chat-rs/**/Cargo.lock') }}
          restore-keys: all-builds-${{ matrix.platform }}-
      - name: Build and verify CLI archive
        run: |
          set -Eeuo pipefail
          target="${{ matrix.target }}"
          archive="dist/cli/iris-${target}.tar.gz"
          ./scripts/cli-release "$target"
          tar -tzf "$archive" | grep '^iris/iris$' >/dev/null
          tar -tzf "$archive" | grep '^iris/install.sh$' >/dev/null
          extracted="$(mktemp -d)"
          trap 'rm -rf "$extracted"' EXIT
          tar -xzf "$archive" -C "$extracted"
          case "$(uname -m):$target" in
            arm64:aarch64-*|aarch64:aarch64-*|x86_64:x86_64-*|amd64:x86_64-*)
              "$extracted/iris/iris" --version
              ;;
            *)
              file "$extracted/iris/iris"
              ;;
          esac
      - name: Upload CLI build
        uses: actions/upload-artifact@v7
        with:
          name: iris-${{ matrix.platform }}-${{ needs.metadata.outputs.version_name }}-${{ needs.metadata.outputs.short_sha }}
          path: ${{ env.APP_DIR }}/dist/cli/iris-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          retention-days: ${{ inputs.artifact_retention_days }}
